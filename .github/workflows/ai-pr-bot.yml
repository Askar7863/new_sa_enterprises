name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git user
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Run Gemini Agent (File Actions)
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          echo "🔥 Running Gemini Agent"

          SAFE_ISSUE=$(printf "%s" "$ISSUE_TEXT" | base64 -w 0)
          DECODED=$(printf "%s" "$SAFE_ISSUE" | base64 --decode)

          PAYLOAD=$(cat <<EOF
          {
            "contents":[{"parts":[{"text":"Return ONLY valid JSON. Format: {\"files\":[{\"path\":\"file\",\"action\":\"create|update|delete\",\"content\":\"...\"}]} If no changes, return {\"files\":[]}.\nIssue:\n$DECODED"}]}]
          }
          EOF
          )

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')

          if ! echo "$TEXT" | jq empty >/dev/null 2>&1; then
            echo "⚠ Using fallback"
            TEXT='{"files":[]}'
          fi

          echo "$TEXT" > AI_RESPONSE.json

          COUNT=$(echo "$TEXT" | jq '.files | length')

          if [ "$COUNT" -gt 0 ]; then
            echo "📁 Processing AI file instructions..."
            echo "$TEXT" | jq -r '.files[] | @base64' > _tmpfiles
            while IFS= read -r row; do
              obj=$(echo "$row" | base64 --decode)
              path=$(echo "$obj" | jq -r '.path')
              action=$(echo "$obj" | jq -r '.action')
              content=$(echo "$obj" | jq -r '.content // ""')

              case "$action" in
                create|update)
                  mkdir -p "$(dirname "$path")"
                  printf "%s" "$content" > "$path"
                  ;;
                delete)
                  rm -f "$path"
                  ;;
              esac
            done < _tmpfiles
          else
            echo "📌 No AI edits. Creating fallback file to force commit."
            echo "AI found no required changes for issue #${{ github.event.issue.number }}" > fallback_${{ github.event.issue.number }}.txt
          fi

      - name: Commit & Push Changes
        id: commit_step
        run: |
          set -e

          BRANCH="ai-force-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          git add .

          git commit -m "AI Forced Commit for Issue #${{ github.event.issue.number }}" || echo "Nothing to commit"
          git push origin "$BRANCH" --force || true

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-force-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI Auto PR - Issue #${{ github.event.issue.number }}"
          body: |
            This PR was created automatically by the AI Agent.

            ### Issue:
            ```
            ${{ github.event.issue.body }}
            ```

            ### Notes:
            - Branch created even if no AI changes
            - Gemini 2.5 Flash used for reasoning
            - Full automation mode enabled
