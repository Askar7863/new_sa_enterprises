name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # You ARE authenticating to GCP, but Gemini API does NOT need this anymore.
      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Call Gemini API (AI generation)
        id: ai_output
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          echo "Sending issue text to Gemini..."
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"contents\": [{\"parts\": [{\"text\": \"$ISSUE_TEXT\"}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          # Extract only the model text (safe)
          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          echo "$AI_TEXT" > AI_GENERATED_OUTPUT.txt

      - name: Generate additional files
        run: |
          echo "Hey there 👋 This file was created automatically by the AI PR Bot!" > HELLO_AI.txt
          echo "Auto-updated at $(date)" >> AUTO_CHANGE_LOG.txt

      - name: Commit & push changes (only if any)
        id: commit_changes
        run: |
          set -e
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "AI-generated changes for Issue #${{ github.event.issue.number }}"
            git push origin "$BRANCH" --force
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot: Automated PR for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated via Gemini AI.
            Issue content:
            ```
            ${{ github.event.issue.body }}
            ```
