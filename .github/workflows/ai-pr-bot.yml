name: Vertex AI Gemini Auto Dev

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Authenticate with Google Cloud
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 3️⃣ Install gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 4️⃣ Install Vertex AI SDK
      - name: Install dependencies
        run: |
          pip install google-cloud-aiplatform

      # 5️⃣ Run Gemini 2.5 Flash (Generative API)
      - name: Run Gemini model
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RAW_ISSUE_TITLE: ${{ github.event.issue.title }}
          RAW_ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'EOF'
          import os, json
          from google.cloud import aiplatform

          PROJECT_ID = os.getenv("GCP_PROJECT_ID")
          ISSUE_TITLE = os.getenv("RAW_ISSUE_TITLE")
          ISSUE_BODY  = os.getenv("RAW_ISSUE_BODY")

          # Escape GH strings safely
          ISSUE_TITLE = json.loads(json.dumps(ISSUE_TITLE))
          ISSUE_BODY  = json.loads(json.dumps(ISSUE_BODY))

          # Init Vertex AI (Generative API)
          aiplatform.init(project=PROJECT_ID, location="us-central1")

          model = aiplatform.GenerativeModel("gemini-2.5-flash")

          # Agent instruction
          prompt = f"""
          You are an autonomous senior AI engineer.
          You will modify the GitHub repository code according to this issue:

          ISSUE TITLE:
          {ISSUE_TITLE}

          ISSUE BODY:
          {ISSUE_BODY}

          Perform these steps:
          1. Understand the task
          2. Modify, create, or delete any necessary files
          3. Return EXACT JSON with:
          {{
            "changes": [
              {{
                "path": "relative/path/to/file",
                "content": "new full content of this file"
              }}
            ]
          }}

          No explanations. Only return JSON.
          """

          response = model.generate_content(prompt)

          raw = response.text
          print("RAW MODEL OUTPUT:", raw)

          # Parse JSON
          try:
              data = json.loads(raw)
          except Exception:
              raise SystemExit("❌ Gemini returned invalid JSON:\n" + raw)

          # Apply changes
          for change in data["changes"]:
              path = change["path"]
              content = change["content"]

              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)

              print("✔ Updated:", path)

          EOF

      # 6️⃣ Commit and Push
      - name: Commit changes
        run: |
          BRANCH=$(echo "${{ github.event.issue.title }}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-40)

          git checkout -b "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "⚠️ No changes detected — skipping PR"
            exit 0
          fi

          git commit -m "AI Update for Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          git push origin "$BRANCH"

      # 7️⃣ Create PR
      - name: Create PR
        run: |
          BRANCH=$(echo "${{ github.event.issue.title }}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-40)

          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/pulls \
            -d "{
              \"title\": \"AI PR: ${{ github.event.issue.title }}\",
              \"body\": \"Automatically generated by Gemini 2.5 Flash from Issue #${{ github.event.issue.number }}\",
              \"head\": \"$BRANCH\",
              \"base\": \"main\"
            }"
