      - name: Run Gemini – Generate File Changes
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          echo "🔥 Asking Gemini for file changes..."

          SAFE_ISSUE=$(printf "%s" "$ISSUE_TEXT" | base64 -w 0)
          DEC_ISSUE=$(printf "%s" "$SAFE_ISSUE" | base64 --decode)

          # --- BEST-POSSIBLE PROMPT (Gemini always obeys) ---
          PAYLOAD=$(cat <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "Return ONLY JSON.\nNo markdown. No text.\nFormat example:\n{\"files\":[{\"path\":\"file\",\"content\":\"text\"}]}\nIf no edits needed, return {\"files\":[]}.\nIssue:\n$DEC_ISSUE"
              }]
            }]
          }
          EOF
          )
          # --------------------------------------------------

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          RAW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')

          if [ -z "$RAW_TEXT" ]; then
            echo "⚠️ EMPTY RESPONSE → fallback"
            RAW_TEXT='{"files":[]}'
          fi

          echo "$RAW_TEXT" > AI_RAW.txt

          # --- EXTRACT JSON FROM ANY GARBAGE ---
          CLEANED=$(echo "$RAW_TEXT" | sed -n 's/.*\({.*}\).*/\1/p')

          if [ -z "$CLEANED" ]; then
            echo "⚠️ Could not extract JSON → fallback"
            CLEANED='{"files":[]}'
          fi

          echo "$CLEANED" > AI_RESPONSE.txt

          # --- Validate JSON ---
          if ! echo "$CLEANED" | jq empty >/dev/null 2>&1; then
            echo "⚠️ Invalid JSON → fallback"
            CLEANED='{"files":[]}'
            echo "$CLEANED" > AI_RESPONSE.txt
          fi

          echo "✅ JSON cleaned and validated."

          FILE_COUNT=$(echo "$CLEANED" | jq '.files | length')

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No files to create."
            exit 0
          fi

          echo "$CLEANED" | jq -r '.files[].path' > file_list.txt

          echo "📄 Writing files..."
          while IFS= read -r FILEPATH; do
            mkdir -p "$(dirname "$FILEPATH")"
            CONTENT=$(echo "$CLEANED" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content")
            printf "%s" "$CONTENT" > "$FILEPATH"
            echo "✔ Updated: $FILEPATH"
          done < file_list.txt
