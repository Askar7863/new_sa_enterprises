name: AI PR Bot – Advanced Repo-Aware Developer

on:
  issues:
    types: [opened, edited]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Configure Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Setup temp directory
        run: mkdir -p .github/ai_tmp

      ###############################################################
      # 1. Parse Intent From Issue
      ###############################################################
      - name: Parse issue intent
        id: intent
        env:
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          python3 << 'EOF'
import json, os, re
text = os.environ["ISSUE_TEXT"]

blocks = [b.strip() for b in re.split(r'\n-{3,}\n|\n\n+', text) if b.strip()]
intent = {"commands": []}

for b in blocks:
    lines = b.splitlines()
    header = lines[0].strip()
    desc = "\n".join(lines[1:]).strip()
    cmd = {}

    if header.lower().startswith("create file:"):
        cmd["type"] = "create"
        cmd["path"] = header.split(":",1)[1].strip()
    elif header.lower().startswith("modify file:"):
        cmd["type"] = "modify"
        cmd["path"] = header.split(":",1)[1].strip()
    elif header.lower().startswith("delete file:"):
        cmd["type"] = "delete"
        cmd["path"] = header.split(":",1)[1].strip()
    elif "analyze repo" in header.lower():
        cmd["type"] = "analyze"
    else:
        cmd["type"] = "unknown"
    
    allow = re.search(r'ALLOW_FAILING:\s*(true|false)', desc, re.I)
    cmd["allow_failing"] = (allow.group(1).lower() == 'true') if allow else False
    desc = re.sub(r'ALLOW_FAILING:.*', '', desc, flags=re.I).strip()

    cmd["description"] = desc
    intent["commands"].append(cmd)

open(".github/ai_tmp/intent.json","w").write(json.dumps(intent))
EOF

      ###############################################################
      # 2. Create Repo Snapshot
      ###############################################################
      - name: Build repo snapshot
        id: snapshot
        run: |
          python3 << 'EOF'
import os, json, base64

snapshot = []

for root, dirs, files in os.walk("."):
    if ".git" in root or "node_modules" in root or ".github/ai_tmp" in root:
        continue
    for f in files:
        path = os.path.join(root, f)
        rel = path[2:]
        try:
            size = os.path.getsize(path)
            if size > 2000000:
                snapshot.append({"path": rel, "size": size, "mode": "skip"})
                continue
            with open(path, "rb") as fh:
                data = fh.read()
            if size <= 20000:
                snapshot.append({
                    "path": rel,
                    "size": size,
                    "mode": "full",
                    "content_b64": base64.b64encode(data).decode()
                })
            else:
                snapshot.append({
                    "path": rel,
                    "size": size,
                    "mode": "preview",
                    "content_b64": base64.b64encode(data[:8000] + b"\n---TRUNCATED---\n" + data[-8000:]).decode()
                })
        except:
            snapshot.append({"path": rel, "mode": "error"})

open(".github/ai_tmp/snapshot.json","w").write(json.dumps(snapshot))
EOF

      ###############################################################
      # 3. Build Request Payload
      ###############################################################
      - name: Build Gemini payload
        run: |
          INSTRUCT="You are an AI Repo Developer. Only return valid JSON:\n\n{\"files\":[{\"path\":\"p\",\"action\":\"create|update|delete\",\"content_base64\":\"...\"}],\"summary\":\"text\"}\n\nModify only requested files unless ANALYZE repo is used."

          SNAP=$(cat .github/ai_tmp/snapshot.json)
          INTENT=$(cat .github/ai_tmp/intent.json)
          ISSUE="${{ github.event.issue.body }}"

          jq -n \
            --arg instr "$INSTRUCT" \
            --arg issue "$ISSUE" \
            --arg intent "$INTENT" \
            --arg snapshot "$SNAP" \
            '{contents:[{parts:[{text:$instr},{text:"### INTENT\n"},{text:$intent},{text:"### ISSUE\n"},{text:$issue},{text:"### SNAPSHOT\n"},{text:$snapshot}]}]}' \
            > .github/ai_tmp/payload.json

      ###############################################################
      # 4. Call Gemini With Retry
      ###############################################################
      - name: Call Gemini
        id: call
        run: |
          TOKEN=$(gcloud auth print-access-token)
          ATTEMPTS=3

          for i in $(seq 1 $ATTEMPTS); do
            echo "Attempt $i..."
            curl -s -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d @.github/ai_tmp/payload.json \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
              > .github/ai_tmp/response_raw.json

            TEXT=$(jq -r '.candidates[0].content.parts[0].text // ""' .github/ai_tmp/response_raw.json)

            echo "$TEXT" > .github/ai_tmp/text.txt

            # Extract JSON
            JSON=$(echo "$TEXT" | sed -n '/{/,/}/p')

            if echo "$JSON" | jq empty; then
              echo "$JSON" > .github/ai_tmp/ai.json
              exit 0
            fi
          done

          echo "FAILED" > .github/ai_tmp/failflag

      ###############################################################
      # 5. Apply File Changes
      ###############################################################
      - name: Apply file changes
        if: ${{ !contains(steps.call.outputs.failure, 'true') }}
        id: apply
        run: |
          JSON=".github/ai_tmp/ai.json"

          if [ ! -f "$JSON" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          COUNT=$(jq '.files | length' "$JSON")
          if [ "$COUNT" -eq 0 ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          jq -c '.files[]' "$JSON" | while read row; do
            path=$(echo $row | jq -r '.path')
            action=$(echo $row | jq -r '.action')
            content=$(echo $row | jq -r '.content_base64 // ""')

            case $action in
              create|update)
                mkdir -p "$(dirname "$path")"
                echo "$content" | base64 --decode > "$path"
                ;;
              delete)
                rm -f "$path"
                ;;
            esac
          done

          echo "changed=true" >> $GITHUB_OUTPUT

      ###############################################################
      # 6. Commit + PR
      ###############################################################
      - name: Commit and push
        if: steps.apply.outputs.changed == 'true'
        id: commit
        run: |
          BR="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BR" || git checkout "$BR"
          git add -A
          git commit -m "AI auto fixes issue #${{ github.event.issue.number }}"
          git push origin "$BR" --force

      - name: Create Pull Request
        if: steps.commit.outputs.changed != 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI Fix for Issue #${{ github.event.issue.number }}"
          body: |
            Automated fix generated by Gemini AI.

      ###############################################################
      # 7. Upload Debug Logs
      ###############################################################
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: .github/ai_tmp
