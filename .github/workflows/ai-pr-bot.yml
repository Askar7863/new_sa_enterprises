name: AI Issue Processor

on:
  issues:
    types: [opened, edited]

jobs:
  collect_and_send:
    runs-on: ubuntu-latest

    permissions:
      issues: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare issue payload
        id: payload
        run: |
          echo "Creating JSON payload"
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg issue_number "${{ github.event.issue.number }}" \
            --arg title "${{ github.event.issue.title }}" \
            --arg body "${{ github.event.issue.body }}" \
            '{repository:$repo, issue_number:$issue_number, title:$title, body:$body}' \
            > issue_payload.json

      - name: Send payload to your AI handler
        env:
          AI_SERVICE_URL: ${{ secrets.AI_HANDLER_URL }}   # your API endpoint
          AI_SERVICE_KEY: ${{ secrets.AI_HANDLER_KEY }}   # auth token for your service
        run: |
          curl -X POST "$AI_SERVICE_URL" \
               -H "Authorization: Bearer $AI_SERVICE_KEY" \
               -H "Content-Type: application/json" \
               --data-binary @issue_payload.json
