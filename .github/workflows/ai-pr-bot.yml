name: Gemini Full Repo Auto Dev

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 1.5 Configure Git identity
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tiktoken

      # 4️⃣ Run Gemini Agent
      - name: Run Full-Repo Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'PY'
from __future__ import annotations
import os, json, requests

API_KEY = os.getenv("GEMINI_API_KEY")
ISSUE_TITLE = os.getenv("ISSUE_TITLE", "")
ISSUE_BODY = os.getenv("ISSUE_BODY", "")

# --------------------------------------
# STEP 1 — READ FULL REPOSITORY
# --------------------------------------
repo_files = []
for root, _, files in os.walk("."):
    if root.startswith("./.git") or "/.git" in root:
        continue
    for f in files:
        if f.startswith(".git") or f.endswith((".pyc", ".so", ".dll", ".exe")):
            continue
        path = os.path.join(root, f)
        try:
            with open(path, "r", encoding="utf-8", errors="ignore") as fp:
                repo_files.append({"path": path.lstrip("./"), "content": fp.read()})
        except:
            continue

# --------------------------------------
# STEP 2 — CHUNK REPO
# --------------------------------------
MAX_CHARS = 8000
chunks, current = [], ""

for file in repo_files:
    text = f"\nFILE: {file['path']}\nCONTENT:\n{file['content']}\n"
    if len(current) + len(text) > MAX_CHARS:
        chunks.append(current)
        current = ""
    current += text

if current:
    chunks.append(current)

CHUNK_TEXT = "\n---\n".join(
    [f"[CHUNK {i+1}]\n{c}" for i, c in enumerate(chunks)]
)

# --------------------------------------
# STEP 3 — BUILD PROMPT
# --------------------------------------
prompt = f"""
You are an autonomous senior software engineer.
You will modify this repo based on the Issue.

ISSUE TITLE:
{ISSUE_TITLE}

ISSUE BODY:
{ISSUE_BODY}

Repository Chunks:
{CHUNK_TEXT}

Return ONLY JSON:
{{
  "changes": [
    {{
      "path": "relative/path/to/file.ext",
      "content": "new file content"
    }}
  ]
}}
"""

# --------------------------------------
# STEP 4 — CALL GEMINI API
# --------------------------------------
if not API_KEY:
    raise SystemExit("GEMINI_API_KEY missing")

url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
headers = {"Content-Type": "application/json"}

payload = {
    "contents": [{"parts": [{"text": prompt}]}]
}

resp = requests.post(url, headers=headers, params={"key": API_KEY}, json=payload, timeout=120)

if resp.status_code != 200:
    raise SystemExit(f"Gemini Error {resp.status_code}: {resp.text}")

resp_json = resp.json()

# parse
try:
    text_output = resp_json["candidates"][0]["content"]["parts"][0]["text"]
except:
    raise SystemExit("Invalid Gemini output: " + json.dumps(resp_json)[:1000])

try:
    data = json.loads(text_output)
except:
    raise SystemExit("Gemini did not return valid JSON:\n" + text_output)

# --------------------------------------
# STEP 5 — APPLY CHANGES
# --------------------------------------
for change in data["changes"]:
    path = change["path"].lstrip("./")
    content = change["content"]

    dirpath = os.path.dirname(path)
    if dirpath:
        os.makedirs(dirpath, exist_ok=True)

    with open(path, "w", encoding="utf-8") as f:
        f.write(content)

    print("✔ Modified:", path)

PY

      # 5️⃣ Commit and Push
      - name: Commit changes and push branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH=$(echo "${ISSUE_TITLE:-ai-update}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' \
            | sed 's/[^a-z0-9._-]/-/g' \
            | sed 's/--*/-/g' \
            | cut -c1-50)

          [ -z "$BRANCH" ] && BRANCH="ai-update"

          git checkout -b "$BRANCH"
          git add --all

          if git diff --cached --quiet; then
            echo "⚠️ No changes — skipping PR"
            exit 0
          fi

          git commit -m "AI update for issue #${{ github.event.issue.number }}"
          git push --set-upstream origin "$BRANCH"

      # 6️⃣ Create PR
      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/pulls" \
            -d @- <<EOF
          {
            "title": "AI PR: ${{ github.event.issue.title }}",
            "body": "Generated automatically from Issue #${{ github.event.issue.number }}",
            "head": "$BRANCH",
            "base": "main"
          }
EOF
