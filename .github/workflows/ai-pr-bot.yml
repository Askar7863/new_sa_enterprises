name: ai-pr-bot

on:
  issues:
    types: [opened, edited]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-pr-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Google OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Run AI PR Bot
        run: |
          python3 .github/ai_pr_bot/main.py \
            "${{ github.event.issue.number }}" \
            "${{ github.event.issue.body }}"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-bot-logs
          path: .github/ai_pr_bot/logs
