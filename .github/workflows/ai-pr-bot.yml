name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OIDC (not needed for Gemini, but fine to keep for future)
      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      # ======================================================
      # SAFE, BASE64-PROTECTED, NULL-PROOF GEMINI AI STEP
      # ======================================================
      - name: Run Gemini – Generate File Changes
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BASE64: ${{ github.event.issue.body | toJSON | base64 }}
        run: |
          echo "🔥 Sending request to Gemini AI..."

          # decode safely — prevents JSON breaking due to quotes, emojis, code blocks
          ISSUE_TEXT=$(echo "$ISSUE_BASE64" | base64 --decode)

          PAYLOAD=$(cat <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "You MUST output STRICT JSON ONLY.\n\nNo markdown, no explanation.\n\nFormat:\n{\n  \"files\": [\n    {\"path\": \"file\", \"content\": \"text\"}\n  ]\n}\n\nIf you cannot generate files, return:\n{\"files\": []}\n\n--- ISSUE CONTENT START ---\n$ISSUE_TEXT\n--- ISSUE CONTENT END ---"
              }]
            }]
          }
          EOF
          )

          # Call Gemini
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          # Extract ONLY the generated text
          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$AI_TEXT" ]; then
            echo "❌ AI returned EMPTY response. Stopping safely."
            exit 0
          fi

          echo "$AI_TEXT" > AI_RESPONSE.txt

          # Validate JSON
          echo "$AI_TEXT" | jq empty 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "❌ INVALID JSON returned. Stopping safely. Check AI_RESPONSE.txt"
            exit 0
          fi

          echo "✅ JSON validated."

          # Null-safe file count
          FILE_COUNT=$(echo "$AI_TEXT" | jq '.files // [] | length')

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No files returned by AI."
            exit 0
          fi

          # Extract file paths
          echo "$AI_TEXT" | jq -r '.files // [] | .[].path' > file_list.txt

          if [ ! -s file_list.txt ]; then
            echo "⚠️ No file paths found."
            exit 0
          fi

          echo "📄 Generating files..."

          # Create each file
          while IFS= read -r FILEPATH; do
            DIR=$(dirname "$FILEPATH")
            mkdir -p "$DIR"

            CONTENT=$(echo "$AI_TEXT" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content // \"\"")

            echo "$CONTENT" > "$FILEPATH"
            echo "✔ Updated: $FILEPATH"
          done < file_list.txt

      - name: Add Bot Metadata
        run: |
          echo "Auto update at $(date)" >> AUTO_CHANGE_LOG.txt

      # ======================================================
      # COMMIT + PUSH + PR CREATION
      # ======================================================
      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes to commit."
            exit 0
          fi

          git commit -m "AI automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ Changes committed & pushed."

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot: Fix for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated using **Gemini 2.5 Flash AI**.

            ## Issue
            ```
            ${{ github.event.issue.body }}
            ```

            ## Bot Output
            ✔ Code analyzed  
            ✔ Files updated  
            ✔ Pull request created  

            🚀 Powered by **Gemini AI**
