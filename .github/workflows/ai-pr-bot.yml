name: Simple File Automation Agent

on:
  issues:
    types: [opened, edited]

jobs:
  file_agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Analyze Repository Structure
        run: |
          echo "🔍 Repository Structure:" > repo_tree.txt
          tree -a . >> repo_tree.txt 2>/dev/null || find . >> repo_tree.txt
          echo "📁 Repo tree saved."

      - name: Process Issue Instructions
        env:
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          echo "📨 Incoming Request:"
          echo "$ISSUE_TEXT"
          echo

          # Normalize instructions to lowercase
          REQUEST=$(echo "$ISSUE_TEXT" | tr '[:upper:]' '[:lower:]')

          if echo "$REQUEST" | grep -q "create file"; then
            FILENAME=$(echo "$REQUEST" | sed -n 's/.*create file \([^ ]*\).*/\1/p')
            CONTENT=$(echo "$REQUEST" | sed -n 's/.*say "\(.*\)".*/\1/p')

            if [ -n "$FILENAME" ]; then
              echo "🆕 Creating $FILENAME"
              echo "${CONTENT:-New file created by bot}" > "$FILENAME"
            fi
          fi

          if echo "$REQUEST" | grep -q "modify"; then
            TARGET=$(echo "$REQUEST" | sed -n 's/.*modify \([^ ]*\).*/\1/p')
            if [ -f "$TARGET" ]; then
              echo "✏ Modifying content of $TARGET"
              echo "" >> "$TARGET"
              echo "# Bot Modification: $(date)" >> "$TARGET"
              echo "Modification requested: $ISSUE_TEXT" >> "$TARGET"
            else
              echo "⚠ File not found for modification"
            fi
          fi

      - name: Commit & Push Changes
        run: |
          git config user.name "AI File Bot"
          git config user.email "bot@noreply.com"
          BRANCH="auto-${{ github.event.issue.number }}"

          git checkout -b "$BRANCH"
          git add .
          if git diff --cached --quiet; then
            echo "No changes. Exiting."
            exit 0
          fi

          git commit -m "Automated file action from Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-${{ github.event.issue.number }}
          title: "Automated File Update for Issue #${{ github.event.issue.number }}"
          body: |
            This Pull Request was automatically generated based on the issue instructions.

            ### Issue Content:
            ```
            ${{ github.event.issue.body }}
            ```
