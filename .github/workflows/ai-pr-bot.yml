name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud via OIDC
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Configure Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Run Gemini AI – Generate File Changes
        id: ai_step
        env:
          RAW_ISSUE: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          echo "🔥 Preparing issue text safely..."
          ISSUE_TEXT="$RAW_ISSUE"

          echo "🔥 Getting Google access token..."
          TOKEN=$(gcloud auth print-access-token)

          echo "🔥 Building instruction..."
          INSTRUCT=$'You are an AI GitHub Agent.\nOnly return valid JSON.\nFormat:\n{"files":[{"path":"file","action":"create|update|delete","content":"text"}]}\nIf no changes needed, return {"files":[]}.\nGitHub Issue:\n'

          COMBINED="${INSTRUCT}${ISSUE_TEXT}"

          PAYLOAD=$(jq -n --arg text "$COMBINED" '{contents:[{parts:[{text:$text}]}]}')

          echo "🔥 Calling Gemini..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent")

          echo "$RESPONSE" > gemini_raw_response.json

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "{}"')
          echo "$AI_TEXT" > AI_RESPONSE.txt

          echo "🔍 Validating JSON..."
          if ! echo "$AI_TEXT" | jq empty >/dev/null 2>&1; then
            echo "❌ INVALID JSON — stopping safely."
            exit 0
          fi

          FILE_COUNT=$(echo "$AI_TEXT" | jq '.files | length')
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No files returned by AI."
            exit 0
          fi

          echo "$AI_TEXT" | jq -r '.files[] | @base64' > files64.txt

          echo "📄 Applying file changes..."
          while IFS= read -r fb; do
            obj=$(echo "$fb" | base64 --decode)
            path=$(echo "$obj" | jq -r '.path')
            action=$(echo "$obj" | jq -r '.action')
            content=$(echo "$obj" | jq -r '.content // ""')

            case "$action" in
              create|update)
                mkdir -p "$(dirname "$path")"
                printf "%s" "$content" > "$path"
                echo "✔ Updated $path"
                ;;
              delete)
                rm -f "$path"
                echo "🗑 Deleted $path"
                ;;
              *)
                echo "⚠️ Unknown action for $path"
                ;;
            esac
          done < files64.txt

      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes to commit."
            exit 0
          fi

          git commit -m "AI automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot: Automated Fix for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was created automatically using **Gemini AI**.
            ### Issue
            ```
            ${{ github.event.issue.body }}
            ```
