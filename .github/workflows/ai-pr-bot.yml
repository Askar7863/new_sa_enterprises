name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write       # OIDC authentication for Google Cloud
      contents: write       # To commit changes
      pull-requests: write  # To open PRs
      issues: read          # To read issue descriptions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Cloud via OIDC
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Generate AI-based code changes using Gemini
        id: ai_generate
        shell: bash
        run: |
          echo "🔍 Reading issue description..."
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          echo "📘 Issue Title: $ISSUE_TITLE"
          echo "📜 Issue Body: $ISSUE_BODY"

          echo "🚀 Calling Gemini model via Vertex AI..."
          ACCESS_TOKEN=$(gcloud auth print-access-token)

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://us-central1-aiplatform.googleapis.com/v1/projects/ai-pr-project/locations/us-central1/publishers/google/models/gemini-1.5-flash:generateContent" \
            -d "{
              \"contents\": [{
                \"role\": \"user\",
                \"parts\": [{
                  \"text\": \"You are an expert AI developer bot working on a GitHub repository. Perform the following task based on the issue:\nTitle: $ISSUE_TITLE\nDescription: $ISSUE_BODY\nIf the issue asks to add or modify code, create or edit relevant files directly. Output only valid code or file content.\"
                }]
              }]
            }")

          echo "🧠 Gemini Response:"
          echo "$RESPONSE" | jq .

          OUTPUT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          if [ -z "$OUTPUT" ] || [ "$OUTPUT" == "null" ]; then
            echo "❌ No valid output from Gemini. Exiting..."
            exit 0
          fi

          # Save AI output to a dynamically named file
          FILE_NAME="AI_TASK_RESULT_$(date +%s).txt"
          echo "$OUTPUT" > "$FILE_NAME"
          echo "✅ Gemini output saved to $FILE_NAME"

      - name: Commit & push changes (only if any)
        id: commit_changes
        run: |
          set -e
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No changes to commit."
          else
            git commit -m "🤖 AI changes for Issue #${{ github.event.issue.number }}"
            git push origin "$BRANCH" --force
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Changes pushed to $BRANCH"
          fi

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "🤖 AI-generated PR for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated by the **AI PR Bot** using **Gemini**.

            **Issue #${{ github.event.issue.number }}**
            ---
            ${{ github.event.issue.body }}

            **Generated Changes:**
            The AI analyzed the issue and proposed/implemented code changes dynamically.
