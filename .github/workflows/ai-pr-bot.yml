      - name: Run Gemini – Smart Project-Aware Code Generator (V2)
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          echo "🧠 Building project file map..."

          # Create a lightweight tree of project files
          find . -type f \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            ! -path "./venv/*" \
            ! -path "./__pycache__/*" > repo_files.txt

          FILE_TREE=$(printf "%s" "$(cat repo_files.txt)" | jq -Rs .)

          # Escape issue text safely
          ISSUE_ESCAPED=$(printf '%s' "$ISSUE_TEXT" | jq -Rs .)

          echo "🔥 Sending smart request to Gemini AI..."

          # ----------- SUPER INTELLIGENT PROMPT -----------
          PAYLOAD=$(cat <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "You are an expert AI GitHub developer assistant.\n
The user has opened a GitHub Issue. Your job is to intelligently modify the project.\n
You understand complete file structure, code style, imports, naming, and conventions.\n
You may modify MULTIPLE files.\n
You generate only VALID JSON with this format:\n
{
  \"files\": [
      {\"path\":\"path/to/file\",\"content\":\"FULL UPDATED FILE CONTENT\"}
  ]
}
If no changes needed, return {\"files\":[]}.

------------------------------
PROJECT FILE TREE:
$FILE_TREE
------------------------------

GITHUB ISSUE:
$ISSUE_ESCAPED
------------------------------
Your task:
- Understand required behavior
- Identify correct files to modify
- Generate updated content following project patterns
- Ensure all code is fully valid and compilable
- NEVER write explanations, markdown or comments
- Only return VALID JSON
"
              }]
            }]
          }
          EOF
          )
          # ---------------------------------------------------

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          # Retry logic
          if [ -z "$AI_TEXT" ]; then
            echo "⚠️ Empty. Retrying…"
            RESPONSE=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")
            AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          fi

          if [ -z "$AI_TEXT" ]; then
            echo "⚠️ Still empty. Using fallback."
            AI_TEXT='{"files":[]}'
          fi

          echo "$AI_TEXT" > AI_RESPONSE.txt

          echo "🔍 Validating JSON..."
          if ! echo "$AI_TEXT" | jq empty ; then
            echo "❌ INVALID JSON from AI — using fallback."
            AI_TEXT='{"files":[]}'
            echo "$AI_TEXT" > AI_RESPONSE.txt
          fi

          echo "✅ JSON valid."

          FILE_COUNT=$(echo "$AI_TEXT" | jq '.files | length')
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No file updates."
            exit 0
          fi

          echo "$AI_TEXT" | jq -r '.files[].path' > file_list.txt

          echo "📄 Applying smart updates..."
          while IFS= read -r FILEPATH; do
            mkdir -p "$(dirname "$FILEPATH")"
            CONTENT=$(echo "$AI_TEXT" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content")
            printf "%s" "$CONTENT" > "$FILEPATH"
            echo "✔ Updated: $FILEPATH"
          done < file_list.txt
