name: AI PR Bot - Bootstrap

on:
  issues:
    types: [opened, edited]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Configure git identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Create workspace and print context
        run: |
          set -euo pipefail
          mkdir -p .github/ai_tmp
          echo "Issue body:"
          echo "----------"
          echo "${{ github.event.issue.body }}"
          echo "----------"
          # show that gcloud auth works (prints token length only for safety)
          if command -v gcloud >/dev/null 2>&1; then
            TOK=$(gcloud auth print-access-token 2>/dev/null || true)
            if [ -n "$TOK" ]; then
              echo "gcloud token present (length: $(printf '%s' \"$TOK\" | wc -c))"
            else
              echo "gcloud token not available in runner (this is normal for local tests)."
            fi
          else
            echo "gcloud not installed on runner."
          fi
          echo "Bootstrap workspace created at .github/ai_tmp"

      - name: Upload debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-bootstrap
          path: .github/ai_tmp
