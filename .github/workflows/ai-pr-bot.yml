name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Run Gemini – Generate File Changes (stable payload building)
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          echo "🧠 Building repo file list (safe)..."
          # collect repo files (ignore git internals and large folders)
          find . -type f \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            ! -path "./venv/*" \
            ! -path "./__pycache__/*" \
            -print > repo_files.txt || true

          FILE_TREE=$(jq -Rs '.' repo_files.txt)
          ISSUE_ESCAPED=$(printf "%s" "$ISSUE_TEXT" | jq -Rs '.')

          # Stable prompt block (kept simple & strict)
          PROMPT=$(cat <<'PROMPT'
You are an expert AI GitHub developer assistant.
You understand complete file structure, code style, imports, and conventions.
You can modify MULTIPLE files and generate fully updated file contents.

Return ONLY VALID MINIFIED JSON with this format:
{"files":[{"path":"path/to/file","content":"full file content"}]}

If no updates needed, return:
{"files":[]}

Do not add explanations, markdown, or any non-JSON text.
PROMPT
)

          # Use jq to build the JSON payload safely (prevents quoting/YAML issues)
          jq -n --arg prompt "$PROMPT" --arg tree "$FILE_TREE" --arg issue "$ISSUE_ESCAPED" \
            '{contents:[{parts:[{text:($prompt + "\n\nPROJECT_FILE_TREE:\n" + $tree + "\n\nISSUE_CONTENT:\n" + $issue)}]}]}' > payload.json

          echo "🔥 Calling Gemini..."
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            > gemini_raw_response.json || true

          # Extract AI text (safe fallback to empty string)
          AI_TEXT=$(jq -r '.candidates[0].content.parts[0].text // ""' gemini_raw_response.json || echo "")

          if [ -z "$AI_TEXT" ]; then
            echo "⚠️ Gemini returned empty. Using fallback JSON with no changes."
            AI_TEXT='{"files":[]}'
          fi

          echo "$AI_TEXT" > AI_RESPONSE.txt

          echo "🔍 Validating JSON..."
          if ! printf "%s" "$AI_TEXT" | jq empty >/dev/null 2>&1; then
            echo "❌ INVALID JSON from AI. Writing fallback and stopping safely."
            AI_TEXT='{"files":[]}'
            printf "%s" "$AI_TEXT" > AI_RESPONSE.txt
          fi

          FILE_COUNT=$(printf "%s" "$AI_TEXT" | jq '.files // [] | length')
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ AI returned no files to modify. Exiting without changes."
            exit 0
          fi

          printf "%s" "$AI_TEXT" | jq -r '.files // [] | .[].path' > file_list.txt

          if [ ! -s file_list.txt ]; then
            echo "⚠️ No file paths detected. Exiting."
            exit 0
          fi

          echo "📄 Creating/Updating files..."
          while IFS= read -r FILEPATH; do
            mkdir -p "$(dirname "$FILEPATH")"
            CONTENT=$(printf "%s" "$AI_TEXT" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content // \"\"")
            printf "%s" "$CONTENT" > "$FILEPATH"
            echo "✔ Updated: $FILEPATH"
          done < file_list.txt

      - name: Add Bot Metadata
        run: |
          echo "Auto update at $(date)" >> AUTO_CHANGE_LOG.txt

      - name: Commit & Push Changes
        id: commit_changes
        run: |
          set -euo pipefail
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes detected"
            exit 0
          fi
          git commit -m "AI automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ Changes committed & pushed"

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot: Fix for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated using **Gemini 2.5 Flash AI**.

            ## Issue Content
            ```
            ${{ github.event.issue.body }}
            ```

            🚀 Powered by **Gemini AI**
