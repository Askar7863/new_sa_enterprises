name: Gemini Full Repo Auto Dev

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install requests tiktoken

      - name: Run Full-Repo Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import requests

          API_KEY = os.getenv("GEMINI_API_KEY")
          ISSUE_TITLE = os.getenv("ISSUE_TITLE")
          ISSUE_BODY = os.getenv("ISSUE_BODY")

          # STEP 1 — READ ALL REPO FILES
          repo_files = []
          for root, _, files in os.walk("."):
              if ".git" in root:
                  continue
              for f in files:
                  if f.startswith(".git"):
                      continue
                  path = os.path.join(root, f)
                  try:
                      with open(path, "r", encoding="utf-8", errors="ignore") as fp:
                          repo_files.append({"path": path, "content": fp.read()})
                  except:
                      pass

          # STEP 2 — CHUNKING
          MAX_CHARS = 7000
          chunks = []
          current = ""

          for file in repo_files:
              text = f"\nFILE: {file['path']}\nCONTENT:\n{file['content']}\n"
              if len(current) + len(text) > MAX_CHARS:
                  chunks.append(current)
                  current = ""
              current += text

          if current:
              chunks.append(current)

          CHUNK_TEXT = "\n---\n".join(
              [f"[CHUNK {i+1}]\n{c}" for i, c in enumerate(chunks)]
          )

          # STEP 3 — PROMPT FOR GEMINI
          prompt = f"""
          You are an autonomous senior engineer tasked with making code changes.

          Issue Title:
          {ISSUE_TITLE}

          Issue Body:
          {ISSUE_BODY}

          Repository Chunks:
          {CHUNK_TEXT}

          CRITICAL JSON FORMAT REQUIREMENTS:
          1. Return ONLY raw JSON - NO markdown fences (```), NO prose, NO comments
          2. Your ENTIRE response must be ONLY valid JSON
          3. Do NOT use null for "content" - always use a string (empty string "" is acceptable)
          4. Ensure ALL commas, quotes, and brackets are properly placed
          5. Escape special characters in strings (newlines as \\n, quotes as \\", etc.)
          6. Test your JSON is valid before responding

          Required JSON schema (and NOTHING else):
          {{
            "changes": [
              {{
                "path": "relative/path/to/file",
                "content": "complete file content as properly escaped string"
              }}
            ]
          }}

          Examples of CORRECT responses:
          {{"changes": [{{"path": "test.txt", "content": "Hello World"}}]}}
          {{"changes": [{{"path": "README.md", "content": "# Title\\n\\nContent here"}}]}}
          {{"changes": []}}

          If no changes needed, return: {{"changes": []}}
          
          Remember: Your response must be parseable by json.loads() with no errors.
          """

          # STEP 4 — CALL GEMINI API
          url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY
          payload = {"contents": [{"parts": [{"text": prompt}]}]}

          resp = requests.post(url, json=payload).json()
          print("RAW RESPONSE:", json.dumps(resp, indent=2)[:1500])

          try:
              text_output = resp["candidates"][0]["content"]["parts"][0]["text"]
          except:
              raise SystemExit("❌ Invalid Gemini response")

          # Strip JSON fences and whitespace
          clean = text_output.strip()
          if clean.startswith("```json"):
              clean = clean[7:].strip()
          elif clean.startswith("```"):
              clean = clean[3:].strip()
          if clean.endswith("```"):
              clean = clean[:-3].strip()

          # Safe JSON parsing with detailed error reporting
          def safe_parse_json(json_str):
              try:
                  return json.loads(json_str)
              except json.JSONDecodeError as e:
                  print(f"❌ JSON Parse Error: {e}")
                  print(f"Error at line {e.lineno}, column {e.colno}, position {e.pos}")
                  # Show context around the error
                  start = max(e.pos - 100, 0)
                  end = min(e.pos + 100, len(json_str))
                  print(f"Context around error:\n...{json_str[start:end]}...")
                  print(f"\nFull response (first 2000 chars):\n{json_str[:2000]}")
                  raise SystemExit("❌ Gemini returned invalid JSON. Check logs above for details.")

          data = safe_parse_json(clean)

          if "changes" not in data:
              raise SystemExit("❌ No 'changes' in response")

          # APPLY CHANGES
          for c in data["changes"]:
              # Skip files marked with skip flag
              if c.get("skip"):
                  print(f"⏭ Skipped: {c.get('path', 'unknown')}")
                  continue
              
              path = c["path"].lstrip("./")
              content = c.get("content")
              
              # Validate content is not null
              if content is None:
                  print(f"⚠ Warning: Skipping {path} - content is null")
                  continue
              
              # Create directory only if path contains a directory component
              dir_name = os.path.dirname(path)
              if dir_name:
                  os.makedirs(dir_name, exist_ok=True)
              
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)

              print("✔ Modified:", path)
          EOF

      - name: Commit changes and push branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH=$(echo "${ISSUE_TITLE:-ai-update}" | tr '[:upper:] ' '[:lower:]-' | sed 's/[^a-z0-9._-]/-/g' | cut -c1-40)
          [ -z "$BRANCH" ] && BRANCH="ai-update"
          git checkout -b "$BRANCH"
          git add .
          if git diff --cached --quiet; then
            echo "No changes — skipping PR"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "AI update for issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          curl -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$OWNER/$REPO/pulls \
            -d "{\"title\": \"AI PR: ${{ github.event.issue.title }}\",\"body\": \"Generated by Gemini AI\",\"head\": \"$BRANCH\",\"base\": \"main\"}"
