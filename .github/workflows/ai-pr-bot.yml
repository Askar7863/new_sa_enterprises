name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OIDC still needed, but NOT used for Gemini
      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      # ===============================
      #  AI SECTION – SAFE, ERROR-PROOF
      # ===============================
      - name: Run Gemini – Generate File Changes
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          echo "🔥 Sending request to Gemini AI..."

          # Strict instructions for JSON generation
          PAYLOAD=$(cat <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "You MUST output STRICT JSON ONLY.\n\nNO explanation. NO markdown. NO extra text.\n\nIf you need to change files, return:\n{\n  \"files\": [\n    { \"path\": \"file1\", \"content\": \"...\" },\n    { \"path\": \"dir/file2\", \"content\": \"...\" }\n  ]\n}\n\nIf you cannot create files, return:\n{\"files\": []}\n\nNow read this issue and generate ONLY the required files:\n--- ISSUE START ---\n$ISSUE_TEXT\n--- ISSUE END ---"
              }]
            }]
          }
          EOF
          )

          # Call Gemini API
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          # Extract only returned text
          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          echo "$AI_TEXT" > AI_RESPONSE.txt

          echo "🔍 Validating JSON output..."

          # Validate JSON first
          echo "$AI_TEXT" | jq empty 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "❌ AI did NOT return valid JSON."
            echo "Raw output saved in AI_RESPONSE.txt"
            exit 0   # Do NOT fail the workflow
          fi

          echo "✅ JSON is valid."

          # Extract file paths safely
          echo "$AI_TEXT" | jq -r '.files[].path' > file_list.txt

          # If empty, stop gracefully
          if [ ! -s file_list.txt ]; then
            echo "⚠️ AI returned an empty file list"
            exit 0
          fi

          # Create/update files
          while IFS= read -r FILEPATH; do
            DIR=$(dirname "$FILEPATH")
            mkdir -p "$DIR"

            FILE_CONTENT=$(echo "$AI_TEXT" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content")

            echo "$FILE_CONTENT" > "$FILEPATH"
            echo "📄 Generated/Updated: $FILEPATH"
          done < file_list.txt

      # Add metadata
      - name: Add Bot Metadata
        run: |
          echo "Auto update at $(date)" >> AUTO_CHANGE_LOG.txt

      # ================================
      # COMMIT + PR CREATION
      # ================================
      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes detected"
            exit 0
          fi

          git commit -m "AI automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ Changes committed"

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot: Fix for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically created using **Gemini 2.5 Flash AI**.

            ## Issue Content
            ```
            ${{ github.event.issue.body }}
            ```

            ### Bot Notes
            - AI parsed your issue
            - Generated/updated code files
            - Created this PR automatically

            🚀 Powered by Gemini AI
