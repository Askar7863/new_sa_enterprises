name: AI Project Agent

on:
  issues:
    types: [opened, edited]

jobs:
  ai_agent:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      # ----------------------
      # CHECKOUT REPO
      # ----------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------
      # GOOGLE CLOUD AUTH (WIF)
      # ----------------------
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      # ----------------------
      # SET GIT USER
      # ----------------------
      - name: Setup Git Identity
        run: |
          git config --global user.name "AI Project Agent"
          git config --global user.email "ai-pr-bot@users.noreply.github.com"

      # ----------------------
      # AI AGENT FULL PROJECT ANALYSIS
      # ----------------------
      - name: Run Gemini Intelligent Agent
        id: agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          echo "📁 Scanning project structure…"
          TREE=$(find . -maxdepth 8 -type f | sed 's/^/ - /')

          echo "🧠 Building prompt…"
          PROMPT=$(cat <<EOF
You are an AI GitHub Project Engineer.

Your responsibilities:
- Read the entire project structure
- Understand the user's issue request
- Modify ANY files required
- Create new files if needed
- Delete/rename files if needed
- Produce clean code following project style

RETURN STRICT JSON ONLY IN THIS FORMAT:

{
  "files": [
    { "path": "path/to/file", "action": "create", "content": "..." },
    { "path": "path/to/file", "action": "update", "content": "..." },
    { "path": "path/to/file", "action": "delete" }
  ]
}

NO MARKDOWN
NO BACKTICKS
NO COMMENTS
NO EXTRA TEXT
ONLY PURE JSON

--- PROJECT TREE ---
$TREE

--- USER ISSUE ---
$ISSUE_TEXT
EOF
)

          echo "🔥 Calling Gemini API…"

          PAYLOAD=$(jq -n --arg p "$PROMPT" \
            '{contents:[{parts:[{text:$p}]}]}')

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$AI_TEXT" ]; then
            echo "⚠️ AI returned empty. Using fallback."
            AI_TEXT='{"files":[]}'
          fi

          echo "$AI_TEXT" > AI_RESPONSE.txt

          echo "🔍 Validating JSON…"

          if ! echo "$AI_TEXT" | jq empty >/dev/null 2>&1; then
            echo "❌ INVALID JSON. Stopping safely."
            exit 0
          fi

          FILE_COUNT=$(echo "$AI_TEXT" | jq '.files | length')
          echo "📦 AI provided $FILE_COUNT file changes."

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No file updates requested."
            exit 0
          fi

          echo "$AI_TEXT" | jq -r '.files[].path' > file_list.txt

          echo "📄 Applying file changes…"

          while IFS= read -r FILEPATH; do
            ACTION=$(echo "$AI_TEXT" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .action")
            CONTENT=$(echo "$AI_TEXT" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content // \"\"")

            case "$ACTION" in
              create|update)
                mkdir -p "$(dirname "$FILEPATH")"
                printf "%s" "$CONTENT" > "$FILEPATH"
                echo "✔ Updated: $FILEPATH"
                ;;
              delete)
                rm -f "$FILEPATH"
                echo "🗑 Deleted: $FILEPATH"
                ;;
            esac
          done < file_list.txt

      # ----------------------
      # COMMIT + PUSH
      # ----------------------
      - name: Commit & Push
        id: commit
        run: |
          BRANCH="ai-agent-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes to commit"
            exit 0
          fi

          git commit -m "AI Agent: Automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ Changes committed and pushed"

      # ----------------------
      # CREATE PR
      # ----------------------
      - name: Create Pull Request
        if: steps.commit.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-agent-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI Agent PR for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated using **Gemini 2.5 Flash (Full Agent Mode)**.

            **Issue Content:**
            ```
            ${{ github.event.issue.body }}
            ```
