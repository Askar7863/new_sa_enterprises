name: Gemini Full Repo Auto Dev

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tiktoken

      - name: Run Full-Repo Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'PY'
import os
import json
import requests

API_KEY = os.getenv("GEMINI_API_KEY")
ISSUE_TITLE = os.getenv("ISSUE_TITLE", "")
ISSUE_BODY = os.getenv("ISSUE_BODY", "")

# STEP 1 — READ REPO
repo_files = []
for root, _, files in os.walk("."):
    if root.startswith("./.git"):
        continue
    for f in files:
        if f.endswith((".pyc", ".dll", ".exe")):
            continue
        path = os.path.join(root, f)
        try:
            with open(path, "r", encoding="utf-8", errors="ignore") as fp:
                repo_files.append({
                    "path": path.lstrip("./"),
                    "content": fp.read()
                })
        except:
            pass

# STEP 2 — CHUNK REPO INTO 8K BLOCKS
MAX_CHARS = 8000
chunks = []
current = ""

for file in repo_files:
    text = f"\nFILE: {file['path']}\nCONTENT:\n{file['content']}\n"
    if len(current) + len(text) > MAX_CHARS:
        chunks.append(current)
        current = ""
    current += text

if current:
    chunks.append(current)

CHUNK_TEXT = ""
for i, c in enumerate(chunks):
    CHUNK_TEXT += f"[CHUNK {i+1}]\n{c}\n---\n"

# STEP 3 — PROMPT
prompt = (
    "You are an autonomous senior engineer.\n"
    "Modify the repository based on this issue.\n\n"
    f"Issue Title:\n{ISSUE_TITLE}\n\n"
    f"Issue Body:\n{ISSUE_BODY}\n\n"
    f"Repository Chunks:\n{CHUNK_TEXT}\n\n"
    "Return ONLY JSON in this structure:\n"
    "{\n"
    '  "changes": [\n'
    '    {\n'
    '      "path": "relative/path.ext",\n'
    '      "content": "file content here"\n'
    "    }\n"
    "  ]\n"
    "}\n"
)

# STEP 4 — CALL GEMINI
if not API_KEY:
    raise SystemExit("Missing GEMINI_API_KEY")

url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
headers = {"Content-Type": "application/json"}
payload = {
    "contents": [
        {"parts": [{"text": prompt}]}
    ]
}

resp = requests.post(url, headers=headers, params={"key": API_KEY}, json=payload)

if resp.status_code != 200:
    raise SystemExit("Gemini Error: " + resp.text)

data = resp.json()

try:
    text_output = data["candidates"][0]["content"]["parts"][0]["text"]
except:
    raise SystemExit("Invalid Gemini output: " + json.dumps(data)[:800])

try:
    parsed = json.loads(text_output)
except:
    raise SystemExit("Gemini did not return JSON:\n" + text_output)

# STEP 5 — APPLY CHANGES
for change in parsed.get("changes", []):
    path = change.get("path")
    content = change.get("content", "")
    if not path:
        continue
    clean_path = path.lstrip("./")
    directory = os.path.dirname(clean_path)
    if directory:
        os.makedirs(directory, exist_ok=True)
    with open(clean_path, "w", encoding="utf-8") as f:
        f.write(content)
    print("✔ Modified:", clean_path)

PY

      - name: Commit changes and push branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH=$(echo "${ISSUE_TITLE:-ai-update}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9._-]/-/g' | cut -c1-50)
          [ -z "$BRANCH" ] && BRANCH="ai-update"

          git checkout -b "$BRANCH"
          git add --all

          if git diff --cached --quiet; then
            echo "No AI changes — skip PR"
            exit 0
          fi

          git commit -m "AI update for issue #${{ github.event.issue.number }}"
          git push --set-upstream origin "$BRANCH"

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$OWNER/$REPO/pulls" \
            -d "{\"title\": \"AI PR: ${{ github.event.issue.title }}\", \"body\": \"Generated from Issue #${{ github.event.issue.number }}\", \"head\": \"$BRANCH\", \"base\": \"main\"}"
