name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      # ===================================================================
      # AI SECTION — FIXED: ALWAYS VALID JSON, NEVER EMPTY OR INVALID
      # ===================================================================
      - name: Run Gemini – Generate File Changes
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}

        run: |
          echo "🔥 Sending request to Gemini AI..."

          SAFE_TEXT=$(printf "%s" "$ISSUE_TEXT" | base64 -w 0)
          DEC_ISSUE=$(printf "%s" "$SAFE_TEXT" | base64 --decode)

          # ------- FIXED PROMPT --------
          PAYLOAD=$(cat <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "You are an automated GitHub PR bot.\n\nYour task:\n1. Understand the issue.\n2. Modify existing files OR create new files.\n3. Always return STRICT VALID JSON.\n\nOutput must ALWAYS follow this format:\n{\"files\":[{\"path\":\"filepath\",\"content\":\"file content\"}]}\n\nRules:\n- No markdown\n- No explanations\n- No comments\n- No backticks\n- Only minified JSON\n- If no changes required: {\"files\":[]}\n\n--- ISSUE START ---\n$DEC_ISSUE\n--- ISSUE END ---"
              }]
            }]
          }
          EOF
          )
          # ------------------------------

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          echo "$AI_TEXT" > AI_RESPONSE.txt

          if [ -z "$AI_TEXT" ]; then
            echo "❌ AI returned EMPTY response. Stopping safely."
            exit 0
          fi

          echo "🔍 Validating JSON..."
          if ! echo "$AI_TEXT" | jq empty >/dev/null 2>&1; then
            echo "❌ INVALID JSON from AI. Stopping safely."
            exit 0
          fi

          echo "✅ JSON is valid."

          FILE_COUNT=$(echo "$AI_TEXT" | jq '.files | length')

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No files to modify. Exiting."
            exit 0
          fi

          echo "$AI_TEXT" | jq -r '.files[].path' > file_list.txt

          echo "📄 Creating/Updating files..."
          while IFS= read -r FILEPATH; do
            mkdir -p "$(dirname "$FILEPATH")"
            CONTENT=$(echo "$AI_TEXT" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content")
            printf "%s" "$CONTENT" > "$FILEPATH"
            echo "✔ Updated: $FILEPATH"
          done < file_list.txt

      - name: Add Bot Metadata
        run: |
          echo "Auto update at $(date)" >> AUTO_CHANGE_LOG.txt

      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes detected"
            exit 0
          fi

          git commit -m "AI automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ Changes committed & pushed"

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot: Fix for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated using **Gemini 2.5 Flash AI**.

            ## Issue Content
            ```
            ${{ github.event.issue.body }}
            ```

            🚀 Powered by **Gemini AI**
