name: Vertex AI Gemini Auto Dev

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Authenticate with Google Cloud
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2️⃣ Install & configure gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 3️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 4️⃣ Install Vertex AI SDK
      - name: Install dependencies
        run: |
          pip install google-cloud-aiplatform

      # 5️⃣ Run Gemini (Vertex AI)
      - name: Run Gemini model
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RAW_ISSUE_TITLE: ${{ github.event.issue.title }}
          RAW_ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'EOF'
          import os, json
          from google.cloud import aiplatform

          PROJECT_ID = os.getenv("GCP_PROJECT_ID")
          ISSUE_TITLE = os.getenv("RAW_ISSUE_TITLE")
          ISSUE_BODY  = os.getenv("RAW_ISSUE_BODY")

          # Escape unsafe text
          ISSUE_TITLE = json.loads(json.dumps(ISSUE_TITLE))
          ISSUE_BODY  = json.loads(json.dumps(ISSUE_BODY))

          aiplatform.init(project=PROJECT_ID, location="us-central1")

          # CORRECT Vertex AI Gemini Flash loader
          model = aiplatform.TextGenerationModel.from_pretrained(
              "gemini-1.5-flash-002"
          )

          prompt = f"""
          You are an autonomous code generator.
          Task from GitHub Issue:

          {ISSUE_BODY}

          Return ONLY JSON:
          {{
            "file_path": "path/to/file",
            "new_content": "<full file content>"
          }}
          """

          # Correct Vertex AI inference
          response = model.predict(prompt)

          # Extract model text output
          output_text = response.text
          print("RAW MODEL OUTPUT:", output_text)

          try:
              data = json.loads(output_text)
          except:
              raise SystemExit("❌ INVALID JSON returned:\n" + output_text)

          file_path = data["file_path"]
          content = data["new_content"]

          os.makedirs(os.path.dirname(file_path), exist_ok=True)

          with open(file_path, "w") as f:
              f.write(content)

          print("✅ Updated file:", file_path)
          EOF

      # 6️⃣ Commit & Push
      - name: Commit changes
        run: |
          BRANCH=$(echo "${{ github.event.issue.title }}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-40)

          git checkout -b "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "⚠️ No changes — PR skipped"
            exit 0
          fi

          git commit -m "AI update for issue #${{ github.event.issue.number }}: ${ISSUE_TITLE}"
          git push origin "$BRANCH"

      # 7️⃣ Create PR
      - name: Create PR
        run: |
          BRANCH=$(echo "${{ github.event.issue.title }}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-40)

          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/pulls \
            -d "{
              \"title\": \"AI PR: ${{ github.event.issue.title }}\",
              \"body\": \"Generated automatically from Issue #${{ github.event.issue.number }}\",
              \"head\": \"$BRANCH\",
              \"base\": \"main\"
            }"
