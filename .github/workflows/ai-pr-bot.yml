name: Google CLI Auto-Engineer

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  google-cli-autobot:
    runs-on: ubuntu-latest

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}  # Add your Gemini/Google AI key here

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install google-generativeai gitpython pyyaml

      - name: ⚙️ Configure Git identity
        run: |
          git config --global user.name "google-cli-autobot"
          git config --global user.email "actions@github.com"

      - name: 🧠 Run Google CLI automation
        run: |
          python <<'PYCODE'
          import os, re, subprocess, google.generativeai as genai
          from git import Repo
          import textwrap

          issue_title = os.getenv("ISSUE_TITLE")
          issue_body = os.getenv("ISSUE_BODY")
          repo_path = os.getcwd()
          branch_name = re.sub(r'[^a-zA-Z0-9_-]', '-', issue_title.lower())[:40]

          genai.configure(api_key=os.getenv("GOOGLE_API_KEY"))

          # 1️⃣ Generate instruction for Gemini
          prompt = textwrap.dedent(f"""
          You are an autonomous developer working inside the GitHub repo `{os.getenv('REPO_NAME')}`.
          Based on this task description from the issue:
          ---
          {issue_body}
          ---
          Perform one of the following (whichever fits the request):
          - Modify a single existing file.
          - Add or remove files.
          - Analyze and edit data files intelligently.
          Produce complete working code for the required changes only — no explanations, no templates.
          """)

          model = genai.GenerativeModel("gemini-1.5-pro")
          response = model.generate_content(prompt)

          generated_code = response.text.strip()

          # 2️⃣ Create new branch
          repo = Repo(repo_path)
          base = repo.heads.master if 'master' in repo.heads else repo.heads.main
          repo.git.checkout(base)
          new_branch = repo.create_head(branch_name)
          new_branch.checkout()

          # 3️⃣ Write changes (the AI-generated code will define what files to update)
          # By default, we'll write to a file AI_CHANGES.md unless the instruction includes a path marker
          file_path = "AI_CHANGES.md"
          with open(file_path, "w", encoding="utf-8") as f:
              f.write(generated_code)

          repo.index.add([file_path])
          repo.index.commit(f"🤖 Auto-update via issue #{os.getenv('ISSUE_NUMBER')}: {issue_title}")
          repo.remote("origin").push(refspec=f"{branch_name}:{branch_name}")

          # 4️⃣ Create a PR automatically
          import requests
          headers = {"Authorization": f"token {os.getenv('GITHUB_TOKEN')}"}
          data = {
              "title": f"Auto PR for Issue #{os.getenv('ISSUE_NUMBER')}: {issue_title}",
              "body": f"This PR was automatically generated from issue #{os.getenv('ISSUE_NUMBER')}.\n\nTask:\n{issue_body}",
              "head": branch_name,
              "base": "main"
          }
          pr_url = f"https://api.github.com/repos/{os.getenv('REPO_OWNER')}/{os.getenv('REPO_NAME')}/pulls"
          res = requests.post(pr_url, headers=headers, json=data)
          print("PR created:", res.json().get("html_url"))
          PYCODE

      - name: ✅ Print completion message
        run: echo "✅ Google CLI automation complete. PR created for issue #${{ github.event.issue.number }}."
