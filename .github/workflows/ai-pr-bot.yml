name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Run Gemini Agent – Generate Actions
        id: ai_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          echo "🔥 Starting Gemini AI Agent…"

          # Safely encode/decode the issue (handles newlines & quotes)
          ISSUE_SAFE=$(printf "%s" "$ISSUE_TEXT" | base64 -w 0)
          DEC_ISSUE=$(printf "%s" "$ISSUE_SAFE" | base64 --decode)

          echo "🧠 Building Agent Prompt…"

          PAYLOAD=$(cat <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "You are an AI GitHub Automation Agent.\nYour job:\n- Analyse the issue\n- Scan the repository structure\n- Modify existing code\n- Add new files\n- Delete unwanted files\n- Refactor code intelligently\n- Generate production-grade code\n\nSTRICT OUTPUT FORMAT:\n{\"files\": [{\"path\":\"path/to/file\",\"action\":\"create|update|delete\",\"content\":\"file content if applicable\"}]}\n\nIf no changes required, return: {\"files\":[]}\n\nISSUE:\n$DEC_ISSUE"
              }]
            }]
          }
          EOF
          )

          echo "🔥 Calling Gemini API…"
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          # Try to get the model text (most reliable path)
          RAW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')

          if [ -z "$RAW" ]; then
            echo "⚠️ Gemini returned empty. Applying fallback (no changes)."
            RAW='{"files":[]}'
          fi

          echo "$RAW" > AI_RAW.txt

          # If RAW is valid JSON — great. If not, try to extract a JSON substring, otherwise fallback.
          if echo "$RAW" | jq empty >/dev/null 2>&1; then
            CLEAN="$RAW"
          else
            # attempt to extract first {...} chunk (best-effort)
            CLEAN=$(printf "%s" "$RAW" | sed -n 's/.*\({.*}\).*/\1/p' || true)
            if [ -z "$CLEAN" ] || ! echo "$CLEAN" | jq empty >/dev/null 2>&1; then
              echo "⚠️ Could not parse AI text as JSON — using safe fallback (no changes)."
              CLEAN='{"files":[]}'
            fi
          fi

          echo "$CLEAN" > AI_RESPONSE.txt
          echo "✅ Clean JSON saved to AI_RESPONSE.txt"

          FILE_COUNT=$(echo "$CLEAN" | jq '.files | length')

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No file actions requested by AI. Exiting."
            exit 0
          fi

          # Create a list of file paths to iterate
          echo "$CLEAN" | jq -r '.files[]?.path' > file_list.txt

          echo "📄 Executing AI file operations…"
          while IFS= read -r FILEPATH; do
            # read action and content for this path
            ACTION=$(echo "$CLEAN" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .action // \"\"")
            CONTENT=$(echo "$CLEAN" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content // \"\"")

            case "$ACTION" in
              create|update)
                mkdir -p "$(dirname "$FILEPATH")"
                printf "%s" "$CONTENT" > "$FILEPATH"
                echo "✔ $ACTION → $FILEPATH"
                ;;
              delete)
                if [ -f "$FILEPATH" ]; then
                  rm "$FILEPATH"
                  echo "🗑 Deleted → $FILEPATH"
                else
                  echo "🗑 Skip delete (not found) → $FILEPATH"
                fi
                ;;
              *)
                echo "⚠️ Unknown action '$ACTION' for $FILEPATH — skipping."
                ;;
            esac
          done < file_list.txt

      - name: Add Bot Metadata
        run: |
          echo "Last AI update: $(date)" >> AI_METADATA.log

      - name: Commit & Push Changes
        id: commit_changes
        run: |
          set -euo pipefail
          BRANCH="ai-agent-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes to commit."
            exit 0
          fi
          git commit -m "AI Agent: Automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-agent-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI Agent PR – Issue #${{ github.event.issue.number }}"
          body: |
            AI Agent has analyzed the issue and performed automated file operations.

            ## Issue
            ```
            ${{ github.event.issue.body }}
            ```

            ## Notes
            - Smart file creation, updating, and deletion
            - Automatic PR generation
            - Powered by Gemini 2.5 Flash
