name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OIDC authentication (still required for your environment)
      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      # ================================
      # MAIN AI STEP (SAFE, QUOTE-PROOF)
      # ================================
      - name: Run Gemini â€“ Generate File Updates
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          echo "đź”Ą Preparing safe issue text..."

          # Safely encode the issue body into JSON-safe format
          ISSUE_JSON=$(jq -Rn --arg x "${{ github.event.issue.body }}" '$x')

          echo "đź§  Building AI payload..."

          PAYLOAD=$(jq -n --arg msg "$ISSUE_JSON" '
            {
              contents: [
                {
                  parts: [
                    {
                      text:
                        "You MUST respond ONLY with a valid JSON object.\n" +
                        "Format:\n" +
                        "{\"files\":[{\"path\":\"file\",\"action\":\"create|update|delete\",\"content\":\"text\"}]}\n" +
                        "If no changes, return: {\"files\":[]}\n" +
                        "No markdown. No comments. No natural language.\n" +
                        "Issue: " + $msg
                    }
                  ]
                }
              ]
            }
          ')

          echo "đź”Ą Calling Gemini API..."

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          # Extract AI text (safe)
          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "{}"')

          echo "$AI_TEXT" > AI_RESPONSE.txt

          echo "đź”Ť Validating JSON..."
          if ! echo "$AI_TEXT" | jq empty >/dev/null 2>&1; then
            echo "âťŚ INVALID JSON from AI. Stopping safely."
            exit 0
          fi

          echo "âś… JSON is valid."

          FILE_COUNT=$(echo "$AI_TEXT" | jq '.files | length')
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "âš ď¸Ź AI returned no files to modify."
            exit 0
          fi

          echo "$AI_TEXT" | jq -r '.files[] | @base64' > files64.txt

          echo "đź“„ Applying file changes..."
          while IFS= read -r fb; do
            obj=$(echo "$fb" | base64 --decode)
            path=$(echo "$obj" | jq -r '.path')
            action=$(echo "$obj" | jq -r '.action')
            content=$(echo "$obj" | jq -r '.content // ""')

            case "$action" in
              create|update)
                mkdir -p "$(dirname "$path")"
                printf "%s" "$content" > "$path"
                echo "âś” Updated: $path"
                ;;
              delete)
                rm -f "$path"
                echo "đź—‘ Deleted: $path"
                ;;
              *)
                echo "âš ď¸Ź Unknown action: $action (ignored)"
                ;;
            esac
          done < files64.txt

      - name: Add Bot Metadata
        run: |
          echo "Auto update at $(date)" >> AUTO_CHANGE_LOG.txt

      # ============================
      #           COMMIT
      # ============================
      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "âš ď¸Ź No changes detected."
            exit 0
          fi

          git commit -m "AI automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "âś… Changes committed & pushed"

      # ============================
      #            PR
      # ============================
      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot: Automated fix for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated using **Gemini 2.5 Flash AI**.

            ## Issue Content
            ```
            ${{ github.event.issue.body }}
            ```

            đź§  AI analyzed the issue and updated files accordingly.

            đźš€ Powered by Gemini AI
