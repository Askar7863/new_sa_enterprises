name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Cloud via OIDC
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Generate AI-based code changes (Gemini)
        id: ai_generate
        shell: bash
        run: |
          echo "📥 Reading issue..."
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          echo "🧠 Issue title: $ISSUE_TITLE"
          echo "📄 Issue body: $ISSUE_BODY"

          echo "🔐 Getting Google access token..."
          ACCESS_TOKEN=$(gcloud auth print-access-token)

          echo "🚀 Sending request to Gemini..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://us-central1-aiplatform.googleapis.com/v1/projects/ai-pr-project/locations/us-central1/publishers/google/models/gemini-1.5-flash:generateContent" \
            -d "{
              \"contents\": [{
                \"role\": \"user\",
                \"parts\": [{
                  \"text\": \"You are an autonomous AI developer bot. Perform this task in a GitHub repo context. Task Title: $ISSUE_TITLE. Task Description: $ISSUE_BODY. Output plain text or code. If the issue asks for a file, print the filename and its content clearly.\"
                }]
              }]
            }")

          echo "🧩 Raw Gemini Response:"
          echo "$RESPONSE" > gemini_raw_response.json
          cat gemini_raw_response.json

          OUTPUT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$OUTPUT" ]; then
            echo "⚠️ No valid output detected from Gemini."
            echo "Gemini returned an unexpected format. Saving full response for inspection."
            cp gemini_raw_response.json AI_RESPONSE_DEBUG.json
            OUTPUT="Gemini did not produce usable content for this issue."
          fi

          # Detect if Gemini output specifies a file (filename:content format)
          FILE_NAME=$(echo "$OUTPUT" | grep -oP '(?<=filename: )[^\s]+' | head -n1 || true)
          if [ -z "$FILE_NAME" ]; then
            FILE_NAME="AI_OUTPUT_$(date +%s).txt"
          fi

          echo "📝 Writing output to $FILE_NAME..."
          echo "$OUTPUT" > "$FILE_NAME"

          echo "✅ Generated file: $FILE_NAME"

      - name: Commit & push changes
        id: commit_changes
        run: |
          set -e
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No changes to commit."
          else
            git commit -m "🤖 AI-generated changes for Issue #${{ github.event.issue.number }}"
            git push origin "$BRANCH" --force
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Changes pushed to $BRANCH."
          fi

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "🤖 AI-generated PR for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated by **AI PR Bot (Gemini)** based on the issue:
            > **${{ github.event.issue.title }}**

            ---
            **Issue Content:**
            ```
            ${{ github.event.issue.body }}
            ```
            ---
            ✅ AI response saved to a file.
