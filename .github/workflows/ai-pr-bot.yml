name: Gemini Auto Dev (API Key)

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repository
    - name: Checkout repo
      uses: actions/checkout@v4

    # 2️⃣ Install Python deps
    - name: Install dependencies
      run: |
        pip install requests

    # 3️⃣ Run Gemini 2.5 Flash using API KEY
    - name: Run Gemini model
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RAW_ISSUE_TITLE: ${{ github.event.issue.title }}
        RAW_ISSUE_BODY: ${{ github.event.issue.body }}
      run: |
        python3 << 'EOF'
import os, json, requests, re

API_KEY = os.getenv("GEMINI_API_KEY")
ISSUE_TITLE = os.getenv("RAW_ISSUE_TITLE")
ISSUE_BODY  = os.getenv("RAW_ISSUE_BODY")

url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY

prompt = f"""
You are an autonomous senior AI engineer.

Modify the GitHub repository based on this issue:

TITLE:
{ISSUE_TITLE}

DESCRIPTION:
{ISSUE_BODY}

Return STRICT JSON only:
{{
  "changes": [
    {{
      "path": "relative/path/to/file",
      "content": "full updated content"
    }}
  ]
}}
"""

payload = {
    "contents": [
        {"parts": [{"text": prompt}]}
    ]
}

response = requests.post(url, json=payload)
resp = response.json()
print("RAW MODEL OUTPUT:", json.dumps(resp, indent=2))

try:
    text = resp["candidates"][0]["content"]["parts"][0]["text"]
except:
    raise SystemExit("❌ Gemini Error:\n" + json.dumps(resp, indent=2))

# Load JSON
try:
    data = json.loads(text)
except:
    raise SystemExit("❌ Gemini returned invalid JSON:\n" + text)

# Apply changes
for change in data["changes"]:
    path = change["path"]
    content = change["content"]

    os.makedirs(os.path.dirname(path), exist_ok=True)
    with open(path, "w") as f:
        f.write(content)

    print("✔ Updated:", path)

EOF

    # 4️⃣ Commit changes
    - name: Commit changes
      run: |
        BRANCH=$(echo "${{ github.event.issue.title }}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-40)
        git checkout -b "$BRANCH"
        git add .

        if git diff --cached --quiet; then
          echo "⚠️ No changes detected — skipping PR"
          exit 0
        fi

        git commit -m "AI Update for Issue #${{ github.event.issue.number }}"
        git push origin "$BRANCH"

    # 5️⃣ Create PR
    - name: Create PR
      run: |
        BRANCH=$(echo "${{ github.event.issue.title }}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-40)

        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/pulls \
          -d "{
            \"title\": \"AI PR: ${{ github.event.issue.title }}\",
            \"body\": \"Generated by Gemini 2.5 Flash via API Key\",
            \"head\": \"$BRANCH\",
            \"base\": \"main\"
          }"
