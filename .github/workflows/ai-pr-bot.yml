name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Run Gemini and Generate Changes
        id: ai_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ISSUE_TEXT="${{ github.event.issue.body }}"

          echo "Calling Gemini..."

          # Build safe JSON payload
          PAYLOAD=$(jq -n --arg msg "$ISSUE_TEXT" '
            {
              contents: [
                {
                  parts: [
                    {
                      text: ("You MUST respond ONLY with valid JSON. Format: {\"files\":[{\"path\":\"file\",\"action\":\"create|update|delete\",\"content\":\"text\"}]} If no changes, return {\"files\":[]} Issue: " + $msg)
                    }
                  ]
                }
              ]
            }
          ')

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "{}"')

          echo "$AI_TEXT" > AI_RESPONSE.txt

          # Validate JSON
          if ! echo "$AI_TEXT" | jq empty >/dev/null 2>&1; then
            echo "Invalid JSON. Stopping."
            exit 0
          fi

          FILE_COUNT=$(echo "$AI_TEXT" | jq '.files | length')
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No files returned by AI."
            exit 0
          fi

          echo "$AI_TEXT" | jq -r '.files[] | @base64' > files64.txt

          while IFS= read -r fb; do
            obj=$(echo "$fb" | base64 --decode)
            path=$(echo "$obj" | jq -r '.path')
            action=$(echo "$obj" | jq -r '.action')
            content=$(echo "$obj" | jq -r '.content // ""')

            case "$action" in
              create|update)
                mkdir -p "$(dirname "$path")"
                printf "%s" "$content" > "$path"
                echo "Updated $path"
                ;;
              delete)
                rm -f "$path"
                echo "Deleted $path"
                ;;
              *)
                echo "Unknown action $action"
                ;;
            esac
          done < files64.txt

      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="auto-pr-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "AI Auto Update for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI PR Bot – Fix for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was created automatically using Gemini 2.5 Flash.

            **Issue content:**
            ```
            ${{ github.event.issue.body }}
            ```
