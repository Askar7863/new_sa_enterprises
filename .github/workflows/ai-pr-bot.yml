name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write       # required for OIDC authentication
      contents: write       # required for committing changes
      pull-requests: write  # required for opening PRs
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Generate AI-based code changes
        shell: bash
        run: |
          echo "Reading issue description..."
          ISSUE_BODY="${{ github.event.issue.body }}"
          echo "Issue Content: $ISSUE_BODY"

          # Create a fun test file (from your issue example)
          echo "Hey there 👋 This file was created automatically by the AI PR Bot!" > HELLO_AI.txt

          # Save issue description for reference
          echo "$ISSUE_BODY" > ai_generated_output.txt

          # Log the update
          echo "Auto-updated at $(date)" >> AUTO_CHANGE_LOG.txt

      - name: Commit changes
        run: |
          git checkout -b auto-pr-${{ github.event.issue.number }} || git checkout auto-pr-${{ github.event.issue.number }}
          git add .
          git commit -m "Auto changes for Issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push origin auto-pr-${{ github.event.issue.number }} --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.event.issue.number }}
          title: "Automated PR for Issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated based on Issue #${{ github.event.issue.number }}.
            Issue content:
            ```
            ${{ github.event.issue.body }}
            ```
