name: Google CLI Auto Dev

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install google-generativeai python-dotenv

      - name: Configure Git
        run: |
          git config --global user.name "google-cli-bot"
          git config --global user.email "actions@github.com"

      - name: Run Gemini AI Agent
        shell: bash
        run: |
          echo "🔥 Running Gemini Agent"

          python3 << 'EOF'
          import os, re, json, google.generativeai as genai

          issue_title = os.getenv("ISSUE_TITLE")
          issue_body  = os.getenv("ISSUE_BODY")
          branch_name = re.sub(r'[^a-zA-Z0-9_-]', '-', issue_title.lower())[:40]

          genai.configure(api_key=os.getenv("GOOGLE_API_KEY"))
          model = genai.GenerativeModel("gemini-1.5-pro")

          prompt = f"""
          You are an autonomous GitHub engineer.
          TASK FROM ISSUE:
          {issue_body}

          Respond ONLY with valid JSON like this example:
          {{
            "file_path": "src/main.py",
            "new_content": "<entire updated file content>"
          }}
          """

          response = model.generate_content(prompt)

          try:
              data = json.loads(response.text)
          except:
              print("❌ Gemini returned invalid JSON or empty output.")
              print("Output was:", response.text)
              exit(1)

          file_path = data.get("file_path")
          new_content = data.get("new_content")

          if not file_path or not new_content:
              print("❌ file_path or new_content missing — cannot update file.")
              exit(1)

          # Ensure directory exists
          os.makedirs(os.path.dirname(file_path), exist_ok=True)

          # Write the updated file
          with open(file_path, "w") as f:
              f.write(new_content)

          print("✅ Updated:", file_path)
          EOF

      - name: Commit & Push changes
        run: |
          BRANCH_NAME=$(echo "${ISSUE_TITLE}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | cut -c1-30)
          
          git checkout -b "$BRANCH_NAME"
          git add .
          
          if git diff --cached --quiet; then
            echo "⚠️ No changes detected — skipping PR"
            exit 0
          fi
          
          git commit -m "AI update for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        run: |
          BRANCH_NAME=$(echo "${ISSUE_TITLE}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | cut -c1-30)

          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/pulls \
            -d "{
              \"title\": \"Auto PR for Issue #$ISSUE_NUMBER: $ISSUE_TITLE\",
              \"body\": \"$ISSUE_BODY\",
              \"head\": \"$BRANCH_NAME\",
              \"base\": \"main\"
            }"
