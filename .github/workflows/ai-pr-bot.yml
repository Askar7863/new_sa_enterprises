name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Google OIDC (you already configured)
      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      # ======================================================
      #     MAIN AI AGENT – CREATE / MODIFY / DELETE FILES
      # ======================================================
      - name: Run Gemini Agent – Generate Actions
        id: ai_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          echo "🔥 Starting Gemini AI Agent…"

          # ---- SAFELY ENCODE ISSUE BODY ----
          SAFE_ISSUE=$(printf "%s" "$ISSUE_TEXT" | base64 -w 0)
          DEC_ISSUE=$(printf "%s" "$SAFE_ISSUE" | base64 --decode)

          echo "🧠 Building Agent Prompt…"

          # ---------------- AGENT PROMPT ------------------
          PAYLOAD=$(cat <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "You are an AI GitHub Automation Agent.\n\
Your job:\n\
- Analyse the issue\n\
- Scan the repository structure\n\
- Modify existing code\n\
- Add new files\n\
- Delete unwanted files\n\
- Refactor code intelligently\n\
- Generate high quality production-grade code\n\
- Always return VALID JSON ONLY.\n\n\
STRICT OUTPUT FORMAT:\n\
{\n\
  \"files\": [\n\
     {\"path\": \"file1\", \"action\": \"create|update|delete\", \"content\": \"file content if any\"}\n\
  ]\n\
}\n\n\
If no changes are required, return:\n\
{\"files\": []}\n\n\
Repository Issue:\n\
$DEC_ISSUE"
              }]
            }]
          }
          EOF
          )
          # ----------------------------------------------------

          echo "🔥 Calling Gemini API…"

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          RAW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')

          if [ -z "$RAW" ]; then
            echo "⚠️ Gemini returned empty → fallback"
            RAW='{"files":[]}'
          fi

          echo "$RAW" > AI_RAW.txt

          # ----------- CLEAN JSON EXTRACTION -----------
          CLEAN=$(echo "$RAW" | sed -n 's/.*\({.*}\).*/\1/p')

          if [ -z "$CLEAN" ]; then
            CLEAN='{"files":[]}'
          fi

          if ! echo "$CLEAN" | jq empty >/dev/null 2>&1; then
            CLEAN='{"files":[]}'
          fi

          echo "$CLEAN" > AI_RESPONSE.txt
          echo "✅ Clean JSON extracted."

          FILE_COUNT=$(echo "$CLEAN" | jq '.files | length')

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No file actions requested."
            exit 0
          fi

          echo "$CLEAN" | jq -r '.files[].path' > file_list.txt

          echo "📄 Executing AI file operations…"

          while IFS= read -r FILEPATH; do
            ACTION=$(echo "$CLEAN" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .action")
            CONTENT=$(echo "$CLEAN" | jq -r ".files[] | select(.path==\"$FILEPATH\") | .content")

            case "$ACTION" in
              create|update)
                mkdir -p "$(dirname "$FILEPATH")"
                printf "%s" "$CONTENT" > "$FILEPATH"
                echo "✔ $ACTION → $FILEPATH"
                ;;
              delete)
                if [ -f "$FILEPATH" ]; then
                  rm "$FILEPATH"
                  echo "🗑 Deleted → $FILEPATH"
                fi
                ;;
            esac
          done < file_list.txt

      - name: Add Bot Metadata
        run: |
          echo "Last AI update: $(date)" >> AI_METADATA.log

      # ======================================================
      # Commit + Push + PR
      # ======================================================
      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="ai-agent-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes created."
            exit 0
          fi

          git commit -m "AI Agent: Automated changes for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-agent-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI Agent PR – Issue #${{ github.event.issue.number }}"
          body: |
            AI Agent has analyzed your issue and performed automated file operations.

            ## Issue
            ```
            ${{ github.event.issue.body }}
            ```

            ## Notes
            - Smart file creation, updating, and deletion
            - Automatic PR generation
            - Powered by Gemini 2.5 Flash 🚀
