name: AI PR Bot Automation

on:
  issues:
    types: [opened, edited]

jobs:
  ai_pr_bot:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/314154954531/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "ai-issue-bot@ai-pr-project.iam.gserviceaccount.com"
          token_format: access_token

      - name: Set up Git Identity
        run: |
          git config --global user.name "AI Issue Bot"
          git config --global user.email "ai-issue-bot@users.noreply.github.com"

      - name: Run Gemini Agent – Generate Actions
        id: ai_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          echo "🔥 Starting Gemini Agent"

          # Safely encode issue
          SAFE=$(printf "%s" "$ISSUE_TEXT" | base64 -w 0)
          ISSUE=$(printf "%s" "$SAFE" | base64 --decode)

          echo "🧠 Preparing JSON payload…"

          PAYLOAD=$(jq -n --arg issue "$ISSUE" '
  {
    contents: [
      {
        parts: [
          {
            text:
              "You are an AI GitHub Automation Agent.\n" +
              "Analyse the issue.\n" +
              "Modify code.\n" +
              "Add files.\n" +
              "Delete files.\n" +
              "Refactor intelligently.\n" +
              "Return STRICT JSON ONLY.\n\n" +
              "FORMAT:\n" +
              "{\"files\":[{\"path\":\"path\",\"action\":\"create|update|delete\",\"content\":\"text\"}]}\n" +
              "If no changes: {\"files\":[]}\n\n" +
              "ISSUE:\n" + $issue
          }
        ]
      }
    ]
  }
')


          echo "$PAYLOAD" > payload.json

          echo "🔥 Calling Gemini API…"

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")

          echo "$RESPONSE" > gemini_raw_response.json

          RAW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')

          if [ -z "$RAW" ]; then
            echo "⚠️ Empty response — using fallback"
            RAW='{"files":[]}'
          fi

          # Clean JSON
          if echo "$RAW" | jq empty >/dev/null 2>&1; then
            CLEAN="$RAW"
          else
            CLEAN=$(printf "%s" "$RAW" | sed -n 's/.*\({.*}\).*/\1/p')
            if ! echo "$CLEAN" | jq empty >/dev/null 2>&1; then
              CLEAN='{"files":[]}'
            fi
          fi

          echo "$CLEAN" > AI_RESPONSE.json

          FILE_COUNT=$(echo "$CLEAN" | jq '.files | length')

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ No modifications requested."
            exit 0
          fi

          echo "📄 Applying file changes…"

          echo "$CLEAN" | jq -c '.files[]' > file_actions.jsonl

          while IFS= read -r row; do
            FILEPATH=$(echo "$row" | jq -r '.path')
            ACTION=$(echo "$row" | jq -r '.action')
            CONTENT=$(echo "$row" | jq -r '.content')

            case "$ACTION" in
              create|update)
                mkdir -p "$(dirname "$FILEPATH")"
                printf "%s" "$CONTENT" > "$FILEPATH"
                echo "✔ $ACTION → $FILEPATH"
                ;;
              delete)
                rm -f "$FILEPATH"
                echo "🗑 Deleted → $FILEPATH"
                ;;
            esac

          done < file_actions.jsonl

      - name: Commit & Push Changes
        id: commit_changes
        run: |
          BRANCH="ai-agent-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "AI Agent: Automated changes for issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-agent-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          title: "AI Agent PR – Issue #${{ github.event.issue.number }}"
          body: |
            AI Agent has analyzed the issue and created/update files.

            ## Issue
            ```
            ${{ github.event.issue.body }}
            ```

            Powered by Gemini 2.5 Flash 🚀
