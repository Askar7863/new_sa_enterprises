{% extends "base.html" %}

{% block content %}
    <div class="row">
        <div class="col-md-6">
            <img src="{{ product.image_url }}" class="img-fluid rounded shadow-sm" alt="{{ product.name }}">
        </div>
        <div class="col-md-6">
            <h1 class="mb-3">{{ product.name }}</h1>
            <p class="lead text-muted">{{ product.description }}</p>
            <h2 class="fw-bold text-primary mb-4">${{ "%.2f" | format(product.price) }}</h2>

            <p class="mb-2"><strong>Availability:</strong> 
                {% if product.stock > 0 %}
                    <span class="badge bg-success">In Stock ({{ product.stock }})</span>
                {% else %}
                    <span class="badge bg-danger">Out of Stock</span>
                {% endif %}
            </p>

            <form action="{{ url_for('add_to_cart', product_id=product.id) }}" method="POST" class="mt-4">
                <div class="row g-3 align-items-center mb-3">
                    <div class="col-auto">
                        <label for="quantity" class="col-form-label">Quantity:</label>
                    </div>
                    <div class="col-auto">
                        <input type="number" id="quantity" name="quantity" class="form-control" value="1" min="1" max="{{ product.stock if product.stock > 0 else 1 }}" {% if product.stock == 0 %}disabled{% endif %} style="width: 80px;">
                    </div>
                    <div class="col">
                        <button type="submit" class="btn btn-success btn-lg" {% if product.stock == 0 %}disabled{% endif %}>
                            <i class="bi bi-cart-plus"></i> Add to Cart
                        </button>
                    </div>
                </div>
            </form>
            
            <a href="{{ url_for('products') }}" class="btn btn-outline-secondary mt-3"><i class="bi bi-arrow-left"></i> Back to Products</a>
        </div>
    </div>
{% endblock %}
