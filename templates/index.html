<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Assistant - Blue Theme</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1><i class="fas fa-robot"></i> Project Assistant</h1>
            <nav>
                <a href="#chatbot-section"><i class="fas fa-comments"></i> Chatbot</a>
                <a href="#report-section"><i class="fas fa-bug"></i> Report Issue</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="chatbot-section" class="card">
            <h2><i class="fas fa-robot"></i> Chat with our Assistant</h2>
            <div class="chat-window" id="chat-window">
                <div class="message bot-message">
                    <p>Hello! I'm your Project Assistant. How can I help you today?</p>
                    <span class="timestamp" id="initial-bot-timestamp"></span>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-message" placeholder="Type your message...">
                <button id="send-button" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </section>

        <section id="report-section" class="card">
            <h2><i class="fas fa-bug"></i> Report an Issue</h2>
            <form id="report-form">
                <div class="form-group">
                    <label for="report-subject">Subject</label>
                    <input type="text" id="report-subject" name="subject" required placeholder="Brief summary of the issue">
                </div>
                <div class="form-group">
                    <label for="report-description">Description</label>
                    <textarea id="report-description" name="description" rows="5" required placeholder="Detailed description of the issue..."></textarea>
                </div>
                <button type="submit" class="btn btn-secondary"><i class="fas fa-upload"></i> Submit Report</button>
                <div id="report-status" class="status-message"></div>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 Project Assistant. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
